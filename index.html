<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>연구소 디펜스 PRO: 빛과 화석의 수호자</title>
    <style>
        :root {
            --primary: #3b82f6; --primary-glow: rgba(59, 130, 246, 0.5);
            --danger: #ef4444; --danger-glow: rgba(239, 68, 68, 0.5);
            --success: #10b981; --success-glow: rgba(16, 185, 129, 0.5);
            --warning: #f59e0b; --warning-glow: rgba(245, 158, 11, 0.5);
            --dark-bg: #0b1120; --panel-bg: rgba(15, 23, 42, 0.85);
        }
        html, body { 
            width: 100%; height: 100%; margin: 0; padding: 0; 
            background: var(--dark-bg); color: white; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; 
            overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #game-container { width: 100%; height: 100vh; height: 100dvh; display: flex; flex-direction: column; }
        #canvas-wrapper { flex-grow: 1; position: relative; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle at center, #1e293b 0%, #0b1120 100%); }
        canvas { display: block; width: 100%; height: 100%; box-shadow: inset 0 0 40px rgba(0,0,0,0.8); }
        #ui-panel { 
            flex-shrink: 0; height: auto; min-height: 220px; padding: 10px; 
            background: var(--panel-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
            box-sizing: border-box; z-index: 10; width: 100%;
        }
        #quiz-box { width: 100%; max-width: 600px; background: rgba(0,0,0,0.4); border-radius: 8px; padding: 6px 10px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #quiz-text { font-size: 1rem; font-weight: 700; text-align: center; color: #f8fafc; line-height: 1.3; word-break: keep-all; min-height: 2.6em; display: flex; align-items: center; justify-content: center; width: 100%; }
        #quiz-img { max-width: 100%; height: 100px; object-fit: contain; margin-top: 5px; border-radius: 5px; display: none; }
        .answer-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; width: 100%; max-width: 600px; margin-bottom: 5px;}
        button.ans { 
            padding: 10px 6px; font-size: 0.9rem; font-weight: 600; 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; 
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); 
            color: #cbd5e1; cursor: pointer; transition: all 0.15s; 
        }
        button.ans:active { transform: scale(0.96); background: rgba(59, 130, 246, 0.3); border-color: #60a5fa; color: white; }
        .tower-selector { display: flex; gap: 6px; width: 100%; max-width: 600px; overflow-x: auto; padding: 5px 2px; scrollbar-width: none; }
        .tower-btn { flex: 1; min-width: 60px; padding: 6px 2px; font-size: 0.7rem; font-weight: bold; border-radius: 10px; background: rgba(15, 23, 42, 0.8); color: #94a3b8; display: flex; flex-direction: column; align-items: center; }
        .tower-btn.active { background: rgba(59, 130, 246, 0.25); border: 2px solid var(--primary); color: white; }
        #stats { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 10px; color: white; font-size: 0.9rem; pointer-events: none; }
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(11, 17, 32, 0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="canvas-wrapper"><canvas id="gameCanvas"></canvas></div>
    <div id="stats">
        <div>💰 자금: <span id="gold-val">0</span></div>
        <div>❤️ 내구도: <span id="life-val">0</span></div>
    </div>
    <div id="overlay">
        <div id="overlay-title" style="font-size: 2.5rem; font-weight: 900; margin-bottom: 20px;">연구소 디펜스 PRO</div>
        <button onclick="startGame('normal')" style="padding: 15px 40px; font-size: 1.2rem; cursor: pointer;">게임 시작</button>
    </div>
    <div id="ui-panel">
        <div id="quiz-box">
            <div id="quiz-text">문제를 맞추고 자원을 얻으세요!</div>
            <img id="quiz-img" src="" alt="퀴즈 이미지">
        </div>
        <div class="answer-buttons">
            <button class="ans" onclick="checkAnswer(0)" id="btn0">-</button>
            <button class="ans" onclick="checkAnswer(1)" id="btn1">-</button>
            <button class="ans" onclick="checkAnswer(2)" id="btn2">-</button>
            <button class="ans" onclick="checkAnswer(3)" id="btn3">-</button>
        </div>
    </div>
</div>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const quizBank = [
        { id: 1, q: "자갈, 모래, 진흙 등이 쌓여 층을 이루고 있는 것은?", a: ["퇴적물", "침식", "지층", "화석"], correct: 2 },
        { id: 24, q: "그림과 같은 지층에서 가장 나중에 쌓인 층의 기호를 고르세요.", img: "images/q24.png", a: ["ㄱ", "ㄴ", "ㄷ", "ㄹ"], correct: 0 },
        { id: 25, q: "다음 중 지층의 특징을 잘못 말한 것은 무엇인가요?", a: ["지층은 줄무늬가 있다.", "지층의 모양은 수평, 끊어짐 등 다양하다.", "지층은 층의 두께가 모두 똑같다.", "다양한 퇴적물이 쌓여 층을 이룬다."], correct: 2 }
        // ... 생략된 기존 문제들
    ];

    let state = { gold: 150, quizIdx: 0, status: 'ready', currentQuiz: null };
    const ui = { 
        text: document.getElementById('quiz-text'), 
        img: document.getElementById('quiz-img'),
        gold: document.getElementById('gold-val') 
    };

    function nextQuiz() {
        state.currentQuiz = quizBank[state.quizIdx % quizBank.length];
        ui.text.innerText = state.currentQuiz.q;
        if (state.currentQuiz.img) {
            ui.img.src = state.currentQuiz.img;
            ui.img.style.display = 'block';
        } else {
            ui.img.style.display = 'none';
        }
        for(let i=0; i<4; i++) document.getElementById('btn'+i).innerText = state.currentQuiz.a[i];
    }

    window.checkAnswer = function(idx) {
        if (idx === state.currentQuiz.correct) {
            state.gold += 30;
            state.quizIdx++;
            nextQuiz();
        }
        ui.gold.innerText = state.gold;
    }

    window.startGame = function(mode) {
        document.getElementById('overlay').style.display = 'none';
        nextQuiz();
    }
</script>
</body>
</html>
